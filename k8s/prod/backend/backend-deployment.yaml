apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment

spec:
  replicas: 3
  selector:
    matchLabels:
      app: hangeul-chat-backend
  
  template:
    metadata:
      labels: 
        app: hangeul-chat-backend
    spec:
      imagePullSecrets:
        - name: ecr-registry
      containers:
        - name: hangeul-chat-backend
          image: 942883569368.dkr.ecr.ap-northeast-2.amazonaws.com/hangeul-chat-backend:f1826082be747af1413301993fbc75b4af3e5520
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
          env:
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
            - name: SPRING_DATA_REDIS_SENTINEL_MASTER
              value: mymaster
          envFrom:
            - configMapRef:
                name: backend-configmap
            - secretRef:
                name: backend-secret
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 28
          # 실행 중 health check
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3