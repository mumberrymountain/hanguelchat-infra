apiVersion: v1
kind: ConfigMap

metadata:
  name: mysql-init-config

data:
  init.sh: |
    #!/bin/bash
    set -e
    if [[ "${MARIADB_REPLICATION_MODE:-}" == "slave" ]]; then
      echo "Skipping app schema init on replica."
      exit 0
    fi

    export MYSQL_PWD="$MARIADB_ROOT_PASSWORD"
    mysql -u root <<EOF
    CREATE USER IF NOT EXISTS '$MARIADB_USER'@'%' IDENTIFIED BY '$MARIADB_PASSWORD';
    GRANT ALL PRIVILEGES ON $MARIADB_DATABASE.* TO '$MARIADB_USER'@'%';
    FLUSH PRIVILEGES;
    EOF

    mysql -u root "$MARIADB_DATABASE" <<EOF

    CREATE TABLE IF NOT EXISTS users (
        id BIGINT AUTO_INCREMENT PRIMARY KEY,
        username VARCHAR(50) UNIQUE NOT NULL,
        email VARCHAR(100) UNIQUE NOT NULL,
        password VARCHAR(255) NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS threads (
        id VARCHAR(36) PRIMARY KEY COMMENT 'UUID (현재 threadId와 동일)',
        user_id BIGINT NOT NULL,
        file_name VARCHAR(255) NOT NULL,
        file_size BIGINT NOT NULL,
        upload_date TIMESTAMP NOT NULL,
        document_content TEXT COMMENT '추출된 문서 내용 저장',
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE,
        INDEX idx_user_id (user_id),
        INDEX idx_created_at (created_at)
    );

    CREATE TABLE IF NOT EXISTS chat_messages (
        id VARCHAR(36) PRIMARY KEY COMMENT 'UUID',
        thread_id VARCHAR(36) NOT NULL,
        role ENUM('user', 'assistant') NOT NULL,
        message TEXT NOT NULL,
        timestamp TIMESTAMP NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (thread_id) REFERENCES threads(id) ON DELETE CASCADE,
        INDEX idx_thread_id (thread_id),
        INDEX idx_timestamp (timestamp)
    );
    EOF
