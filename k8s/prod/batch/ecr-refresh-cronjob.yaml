# CronJob: refresh ECR docker-registry secret every 10 hours (token expires in 12h).
# Runs with hostNetwork so the pod uses the node's IAM instance profile for ECR.
#
# First-time setup: create secret once (run job manually so you don't wait 10h):
#   kubectl apply -f infrastructure/k8s/prod/batch/
#   kubectl create job --from=cronjob/ecr-refresh ecr-refresh-manual -n default
# Then apply/restart frontend and backend deployments.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-refresh
  namespace: default
spec:
  schedule: "0 */10 * * *"   # every 10 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          restartPolicy: OnFailure
          serviceAccountName: ecr-refresh
          containers:
            - name: refresh
              image: amazon/aws-cli:2.15.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  REGISTRY="942883569368.dkr.ecr.ap-northeast-2.amazonaws.com"
                  REGION="ap-northeast-2"
                  echo "Installing kubectl..."
                  curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                  chmod +x kubectl && mv kubectl /usr/local/bin/
                  echo "Getting ECR token..."
                  TOKEN=$(aws ecr get-login-password --region "$REGION")
                  echo "Updating secret ecr-registry..."
                  kubectl create secret docker-registry ecr-registry \
                    --docker-server="$REGISTRY" \
                    --docker-username=AWS \
                    --docker-password="$TOKEN" \
                    --dry-run=client -o yaml | kubectl apply -f -
                  echo "Done."
